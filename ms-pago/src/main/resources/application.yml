spring:
  application:
    name: ms-pago
  datasource:
    url: jdbc:mysql://host.docker.internal:3306/db_pago?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: 
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        physical_naming_strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
        format_sql: true
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog.sql
 
server:
  port: 8090
 
api:
  venta:
    url: http://host.docker.internal:8089
  dueno:
    url: http://host.docker.internal:8082
 
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true